name: Deploy Supabase

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  migrate:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Mark content migrations as reverted (force re-seed)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          # These were recorded as "applied" but data never persisted.
          # Mark them reverted so db push will re-apply them.
          for v in \
            20260319000001 \
            20260319000002 \
            20260404000002 \
            20260405000004 \
            20260405000005 \
            20260405000006 \
            20260406000002; do
            echo "Reverting $v..."
            supabase migration repair --status reverted $v 2>&1 || true
          done
          # Clean up the deleted broken migration record
          supabase migration repair --status reverted 20260405100000 2>&1 || true

      - name: Push all migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push

  deploy-functions:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    needs: migrate
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
