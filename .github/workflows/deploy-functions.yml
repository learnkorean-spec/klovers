name: Deploy Supabase

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  migrate:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Mark content migrations as reverted
        run: |
          for v in \
            20260319000001 \
            20260319000002 \
            20260404000002 \
            20260405000004 \
            20260405000005 \
            20260405000006 \
            20260406000002; do
            echo "Reverting $v..."
            supabase migration repair --status reverted $v 2>&1 || true
          done
          supabase migration repair --status reverted 20260405100000 2>&1 || true

      - name: Push all migrations
        run: supabase db push

  deploy-functions:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    needs: migrate
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
