name: Deploy Supabase

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  migrate:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Supabase CLI
        run: npx supabase@latest --version

      - name: Link project
        run: npx supabase@latest link --project-ref $SUPABASE_PROJECT_REF

      - name: Push schema migrations
        run: npx supabase@latest db push

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Seed lesson content (idempotent)
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          DB_URL="postgresql://postgres:${PGPASSWORD}@db.${PROJECT_REF}.supabase.co:5432/postgres?sslmode=require"
          for f in \
            supabase/migrations/20260319000001_kdrama_lesson_1_content.sql \
            supabase/migrations/20260319000002_kdrama_lessons_2_to_5_content.sql \
            supabase/migrations/20260404000002_seed_all_textbook_lessons.sql \
            supabase/migrations/20260405000004_grammar_mastery_1_57.sql \
            supabase/migrations/20260405000005_daily_routine_lessons_21_32.sql \
            supabase/migrations/20260405000006_kdrama_lessons_6_30.sql \
            supabase/migrations/20260406000002_daily_routine_lessons_1_20.sql \
            supabase/migrations/20260407000003_erase_korean1.sql; do
            echo "Applying $f..."
            psql "$DB_URL" -f "$f"
          done

  deploy-functions:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    needs: migrate
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Supabase CLI
        run: npx supabase@latest --version

      - name: Deploy all edge functions
        run: npx supabase@latest functions deploy --project-ref $SUPABASE_PROJECT_REF
