name: Deploy Supabase

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  migrate:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install postgresql-client
        run: sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client

      - name: Apply pending schema migrations
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -e
          DB_URL="postgresql://postgres@db.${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co:5432/postgres?sslmode=require"
          echo "Testing connection..."
          psql "$DB_URL" -c "SELECT current_database();" || { echo "ERROR: Cannot connect"; exit 1; }
          echo "=== Applying schema migrations ==="
          for f in \
            supabase/migrations/20260405000007_fix_manual_enrollment_validation.sql \
            supabase/migrations/20260407000001_enrollment_integrity_v2.sql \
            supabase/migrations/20260405100001_fix_slot_matching_lock.sql \
            supabase/migrations/20260405100002_cancel_enrollment_and_admin_notes.sql \
            supabase/migrations/20260406000001_add_lesson_fk_indexes.sql; do
            if [ -f "$f" ]; then
              echo "Applying $f..."
              psql "$DB_URL" -f "$f" && echo "OK" || echo "WARN: $f (may already exist)"
            fi
          done

      - name: Seed lesson content
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -e
          DB_URL="postgresql://postgres@db.${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co:5432/postgres?sslmode=require"
          echo "=== Seeding lesson content ==="
          for f in \
            supabase/migrations/20260404000002_seed_all_textbook_lessons.sql \
            supabase/migrations/20260319000001_kdrama_lesson_1_content.sql \
            supabase/migrations/20260319000002_kdrama_lessons_2_to_5_content.sql \
            supabase/migrations/20260405000001_korean1_lessons_1_50.sql \
            supabase/migrations/20260405000002_korean1_lessons_51_120.sql \
            supabase/migrations/20260405000003_korean1_lessons_121_180.sql \
            supabase/migrations/20260405000004_grammar_mastery_1_57.sql \
            supabase/migrations/20260405000005_daily_routine_lessons_21_32.sql \
            supabase/migrations/20260405000006_kdrama_lessons_6_30.sql \
            supabase/migrations/20260406000002_daily_routine_lessons_1_20.sql; do
            if [ -f "$f" ]; then
              echo "Seeding $f..."
              psql "$DB_URL" -f "$f" && echo "OK" || echo "WARN: $f had errors"
            fi
          done
          echo "=== VERIFICATION ==="
          psql "$DB_URL" -c "SELECT 'vocab' as tbl, count(*) FROM lesson_vocabulary UNION ALL SELECT 'grammar', count(*) FROM lesson_grammar UNION ALL SELECT 'dialogues', count(*) FROM lesson_dialogues UNION ALL SELECT 'exercises', count(*) FROM lesson_exercises UNION ALL SELECT 'reading', count(*) FROM lesson_reading;"

  deploy-functions:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    needs: migrate
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
